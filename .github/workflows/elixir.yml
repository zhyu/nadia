name: Elixir CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

env:
  OTP_VERSION: '29.0.1'
  ELIXIR_VERSION: '1.20.0'

jobs:
  format:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Dependencies
        run: mix deps.get

      - name: Format Check
        run: mix format --check-formatted

  test:
    name: Test with OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27.3.4.12'
            elixir: '1.20.0'
          - otp: '29.0.1'
            elixir: '1.20.0'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Install Dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Tests
        run: mix test

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    needs: [format, test]
    env:
      MIX_ENV: docs
    steps:
      - uses: actions/checkout@v6

      - name: Setup Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Dependencies
        run: mix deps.get

      - name: Generate Docs
        run: mix docs --warnings-as-errors
